<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        form { width: 300px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; }
        input { display: block; width: 90%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: green; color: white; border: none; }
    </style>
</head>
<body>
    <form method="POST">
        <h3>Login</h3>
        <input type="text" name="username" placeholder="Username (e.g. admin)" required>
        <input type="password" name="password" placeholder="Password (e.g. 1234)" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
