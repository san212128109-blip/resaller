<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .product-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .nav { margin-bottom: 20px; }
        .btn { padding: 10px; background: blue; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Available Products</h2>
    <div class="nav">
        <a href="{{ url_for('login') }}" class="btn">Login to Add Product</a>
        <a href="{{ url_for('logout') }}" style="color: red; margin-left: 20px;">Logout</a>
    </div>
    <hr>
    {% for product in products %}
    <div class="product-card">
        <h3>{{ product.name }}</h3>
        <p>Price: ${{ product.price }}</p>
        <p>{{ product.details }}</p>
        <small>Added by: {{ product.added_by }}</small>
    </div>
    {% endfor %}
</body>
</html>
